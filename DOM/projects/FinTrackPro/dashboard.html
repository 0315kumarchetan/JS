<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dashboard.css">
    <title>Dashboard</title>
</head>
<body>
        <nav>
            <header id="left-header">
                <h3>FinTrack Pro</h3>
                <p>Enterprise Finance</p>
            </header>
            <div id="menu">
                    <button id="dashBtn">Dashboard</button>
                    <button id="settingsBtn">Settings</button>
                    <button id="transactionBtn"><b>+</b> Add Transaction </button>
            </div>
        </nav>
        <main>
            <header id="right-header">
                <div id="usernameDisplay">
                    <h4 id = "uName1"></h4>
                </div>
                <div id="logout">
                    <button>Logout</button>
                </div>
            </header>

            <!-- <div id = "area"> -->
                <div id="dashboard-display">
                    <div class="card"  id="card1">
                        
                    </div>
                    <div class="card" id="card2">
                        
                    </div>
                    <div class="card" id="card3">
                        
                    </div>
                    <div class="card" id="card4">
                        
                    </div>

                </div>
                <div class="gp">
                        <div id="cash-graph">
                            <h3>Cash Flow Analysis</h3>
                            <button id="refreshChartBtn"><i class="fa-solid fa-arrows-rotate fa-2xl" style="color: rgb(116, 192, 252);"></i></button>
                            <canvas id="myChart"></canvas>
                        </div>
                        <div id="preferences">
                            <h1>Preferences</h1>
                            <div id="mode">
                                <button>Change Theme</button>
                            </div>
                            <div id="reset">
                                
                                <button>
                                    <span><i class="fa-regular fa-trash-can" style="color: rgb(210, 8, 8);"></i></span>
                                    Reset All Data</button>
                            </div>
                        </div>
                </div>
                <div class="transactions">
                    <div id="t-menu">
                            
                                <input type="text" id="search-text" placeholder="search ...">
                        

                            
                                <select name="type" id="type" >
                                    <option value="#" disabled selected>select</option>
                                    <option value="INCOME">Income</option>
                                    <option value="EXPENSE">Expenses</option>
                                </select>

                        
                    </div>

                    <div id="list">
                        <table>
                                <thead>
                                    <tr>
                                    <th>DATE</th>
                                    <th>Description</th>
                                    <th>Category</th>
                                    <th>Amount</th>
                                    <th>Action</th>
                                    </tr>
                                </thead>
                            <tbody>
                                
                            </tbody>
                        </table>

                    </div>

                </div>
            <!-- </div> -->


        </main>  
        <div id="main2" style="display:none;">
            <header id="right-header">
                <div id="usernameDisplay">
                    <h4 id="uName2"></h4>
                </div>
                <div id="logout">
                    <button>Logout</button>
                </div>
            </header>

            <div id="settings">
                <header id="heading-para">
                    <h1>Settings</h1>
                    <p>Manage your account profile and app formatting.</p>
                </header>

                <div id="profile-details">
                    <form id="profile-details-form">
                        <h1>Profile Details</h1>
                        <label for="update-name">Username</label>
                        <input type="text" id="update-name" name="update-name" required>
                        <label for="profile-cur-select">Primary Currency</label>
                        <select id="profile-cur-select" name="currency">
                            <option value="₹">Indian Rupee (INR)</option>
                            <option value="$">US Dollar (USD)</option>
                            <option value="€">Euro (EUR)</option>
                            <option value="¥">Japanese Yen (YEN)</option>
                            <option value="﷼">RIAL (RIAL)</option>
                        </select>
                        <button type="submit">Save</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="form">
            <form id = "createTxn">
                 <div class="top">
                    <h6 id="close"><i class="fa-solid fa-x" style="color: rgb(255, 2, 2);"></i></h6>
                </div>
                <h1 id="createTxn-h1">Add Transaction</h1>
                <select id="type" name="type">
                    <option value="">-- Choose Type--</option>
                    <option value="INCOME">Income</option>
                    <option value="EXPENSE">Expense</option>
                </select>
                <input type="text" placeholder="Description" id="createTxndescription"/>
                <input type="number" placeholder="Amount" id="createTxnamount"/>
                <input type="date" placeholder="Date" id="createTxndate"/>
                <select id="category" name="category" >
                    <option value="">Choose Category</option>
                    <option value="SALARY">Salary</option>
                    <option value="PROFIT">Profit</option>
                    <option value="REAL_STATE_PROFIT">Real State Profit</option>
                    <option value="BUSINESS">Business</option>
                    <option value="FOOD">Food</option>
                    <option value="TRAVEL">Travel</option>
                    <option value="SHOPPING">Shopping</option>
                    <option value="bills">Bills</option>
                </select>
                <button id="createTxnbtn">Create</button>
            </form>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <script src="dashboard.js"></script>
</body>
</html>
